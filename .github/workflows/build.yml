name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build Project
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -target LunarCalendarBar \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "Build exit code: $?"
            
      - name: Create DMG
        run: |
          brew install create-dmg || true
          
          # Get derived data path
          DERIVED_DATA=$(ls -d ~/Library/Developer/Xcode/DerivedData/LunarCalendarBar-*)
          echo "Derived Data: $DERIVED_DATA"
          
          if [ -d "$DERIVED_DATA" ]; then
            APP_PATH="$DERIVED_DATA/Build/Products/Release/LunarCalendarBar.app"
            echo "App path: $APP_PATH"
            echo "App exists: $([ -d $APP_PATH ] && echo YES || echo NO)"
            ls -la "$DERIVED_DATA/Build/Products/Release/"
          fi
          
          WORKDIR=/Users/runner/work/LunarCalendarBar
          cd "$WORKDIR"
          
          /opt/homebrew/bin/create-dmg \
            --volname "LunarCalendarBar" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --app-drop-link 350 150 \
            "$WORKDIR/LunarCalendarBar.app" \
            LunarCalendarBar.dmg || echo "Trying alternative..."
          
          ls -la *.dmg 2>/dev/null || echo "No dmg created"
          
      - name: Upload DMG Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          path: LunarCalendarBar.dmg
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: LunarCalendarBar.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}