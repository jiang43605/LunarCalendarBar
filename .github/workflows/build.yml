name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build Project
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -target LunarCalendarBar \
            -configuration Release \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Find and list app
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "LunarCalendarBar.app" -type d
          ls -la ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release/
          
      - name: Create DMG
        run: |
          brew install create-dmg || true
          
          # Find the app bundle
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "LunarCalendarBar.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find app bundle"
            exit 1
          fi
          
          # Get absolute path
          APP_PATH=$(cd "$APP_PATH" && pwd)
          echo "Absolute path: $APP_PATH"
          
          cd /Users/runner/work/LunarCalendarBar
          rm -f LunarCalendarBar.dmg
          
          /opt/homebrew/bin/create-dmg \
            --volname "LunarCalendarBar" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --app-drop-link 350 150 \
            "$APP_PATH" \
            LunarCalendarBar.dmg
          
          ls -la *.dmg
          
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          path: LunarCalendarBar.dmg
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: LunarCalendarBar.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}