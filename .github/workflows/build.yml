name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build Project (Debug)
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -scheme LunarCalendarBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            build -quiet
            
      - name: Build Project (Release)
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -scheme LunarCalendarBar \
            -configuration Release \
            -destination 'platform=macOS' \
            build -quiet
            
      - name: Create DMG
        run: |
          # Find the built app
          APP_PATH=""
          for derived in ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release; do
            if [ -d "$derived/LunarCalendarBar.app" ]; then
              APP_PATH="$derived/LunarCalendarBar.app"
              break
            fi
          done
          
          echo "Found app: $APP_PATH"
          
          # Install create-dmg if needed
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          # Remove existing dmg if exists
          rm -f LunarCalendarBar.dmg
          
          # Create DMG
          create-dmg \
            --volname "LunarCalendarBar" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --app-drop-link 350 150 \
            "$APP_PATH" \
            "LunarCalendarBar.dmg" || echo "Note: DMG may have issues"
          
          ls -la *.dmg 2>/dev/null || echo "No DMG found"
          
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          path: LunarCalendarBar.dmg
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: LunarCalendarBar.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}