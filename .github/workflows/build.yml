name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate Xcode Project
        run: swift package generate-xcodeproj
        
      - name: Build Project (Debug)
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -scheme LunarCalendarBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
            
      - name: Build Project (Release)
        run: |
          xcodebuild -project LunarCalendarBar.xcodeproj \
            -scheme LunarCalendarBar \
            -configuration Release \
            -destination 'platform=macOS' \
            build
            
      - name: Create DMG
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "LunarCalendarBar.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          rm -f LunarCalendarBar.dmg
          
          create-dmg \
            --volname "LunarCalendarBar" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --app-drop-link 350 150 \
            "$APP_PATH" \
            "LunarCalendarBar.dmg"
          
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          path: LunarCalendarBar.dmg
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate Xcode Project
        run: swift package generate-xcodeproj
        
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: LunarCalendarBar-DMG
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: LunarCalendarBar.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}