name: LunarCalendarBar
options:
  bundleIdPrefix: com.lunarcalendar
  deploymentTarget:
    macOS: "14.0"

targets:
  LunarCalendarBar:
    type: application
    platform: macOS
    sources:
      - path: LunarCalendarBar
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lunarcalendar.bar
        PRODUCT_NAME: LunarCalendarBar
        INFOPLIST_FILE: LunarCalendarBar/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: NO